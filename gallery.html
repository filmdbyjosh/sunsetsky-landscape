<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View the full portfolio of Sunset Sky Landscape projects in Tucson, Arizona.">
  <title>Our Work | Sunset Sky Landscape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header header--solid-page" id="header">
    <div class="header__inner container">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Sunset Sky Landscape & Design" class="logo__img logo__img--loaded">
        <span class="logo__text">
          <span class="logo__main">Sunset Sky</span>
          <span class="logo__sub">Landscape & Design</span>
        </span>
      </a>

      <nav class="nav" id="nav">
        <a href="index.html#about" class="nav__link">About</a>
        <a href="index.html#services" class="nav__link">Services</a>
        <a href="gallery.html" class="nav__link">Our Work</a>
        <a href="index.html#reviews" class="nav__link">Reviews</a>
      </nav>

      <div class="header__actions">
        <a href="tel:5206647057" class="header__phone">(520) 664-7057</a>
        <a href="index.html?quote=1" class="btn btn--primary">Request a Free Quote</a>
        <button type="button" class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="gallery-page">
    <div class="container">
      <div class="gallery-page__header">
        <a href="index.html#work" class="gallery-page__back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
          Back to Home
        </a>
        <span class="section-label">Portfolio</span>
        <h1 class="section-title">Our Work</h1>
        <p class="section-body">Browse our complete collection of landscape projects across Tucson and surrounding areas.</p>
      </div>

      <div class="work-panel">
        <div class="gallery__grid" id="gallery-grid"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__bottom container">
      <p>&copy; 2026 Sunset Sky Landscape. All rights reserved.</p>
    </div>
  </footer>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button type="button" class="lightbox__close" id="lightbox-close" aria-label="Close gallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <button type="button" class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Previous image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img src="" alt="" class="lightbox__image" id="lightbox-image">
    <button type="button" class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Next image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <script src="js/gallery-images.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
